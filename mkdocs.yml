# Project information
site_name: Micromake Documentation
site_url: https://micromake.github.io

# Repository
repo_name: Micromake Documentation
repo_url: https://github.com/micromake/micromake.github.io
edit_uri: edit/main/docs

# Copyright
copyright: Copyright &copy; 2026 Micromake

# Configuration
theme:
  language: zh
  name: material
  # custom_dir: overrides
  features:
    - announce.dismiss
    - content.action.edit
    # - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - navigation.sections
    # - navigation.tabs
    - navigation.top
    - search.highlight
    
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: lucide/sun-moon
        name: 切换至日间模式

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: lucide/sun
        name: 切换至夜间模式

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: light blue
      toggle:
        icon: lucide/moon-star
        name: 切换至自动模式
       
  favicon: assets/logo.png
  logo: assets/logo.png
  icon:
    tag:
      default: lucide/hash

extra_css:
  - assets/stylesheets/extra.css
  - assets/stylesheets/extra2.css
  - assets/stylesheets/customize.css
  - assets/stylesheets/ziti.css

# extra_javascript:
#   - assets/javascripts/glm-config.js
#   - assets/javascripts/glm-translate.js
  
# Plugins
plugins:
  - search
  - tags

# Additional configuration
extra:
  alternate:
    - name: English
      link: "https://micromake.github.io/docs/"
      lang: en
      
  scope: /
  annotate:
    json: [.s2]
  status:
    new: 最近添加
    deprecated: 已弃用
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/micromake
  #   - icon: fontawesome/brands/discord
  #     link: https://discord.com/invite/hqXRNq9CjT
  #   - icon: fontawesome/brands/x-twitter
  #     link: https://x.com/zensical
  tags:
    default: default

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:zensical.extensions.emoji.to_svg
      emoji_index: !!python/name:zensical.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: zensical
      repo: zensical
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page tree
nav:
  # - Home: https://micromake.github.io
  - 导览: index.md
  - DIY套件: 
            - 三角洲3D打印机:
              - delta/0/0.md
              - delta/1/1.md
              - delta/2/2.md
              - delta/3/3.md
              - delta/4/4.md
              - delta/5/5.md
              - delta/6/6.md
              - delta/7/7.md
